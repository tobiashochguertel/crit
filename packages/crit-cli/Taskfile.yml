version: "3"

vars:
  BINARY: crit
  CMD_PKG: ./cmd/crit
  BUILD_DIR: dist
  MODULE:
    sh: go list -m 2>/dev/null || echo "github.com/tobiashochguertel/crit"
  # Version: prefer a git tag, fall back to commit hash
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  # ---------------------------------------------------------------------------
  # Auto-detect GitHub repository coordinates from the git remote, so that
  # init-* tasks use skills/commands from the developer's own fork and branch.
  # Any of these can be overridden by setting the env var before running task:
  #   CRIT_GITHUB_OWNER=myname task init-claude
  # ---------------------------------------------------------------------------
  GIT_OWNER:
    sh: echo "${CRIT_GITHUB_OWNER:-$(git remote get-url origin 2>/dev/null | sed -E 's|.*github\.com[/:]([^/]+)/.*|\1|' || echo 'tobiashochguertel')}"
  GIT_REPO:
    sh: echo "${CRIT_GITHUB_REPO:-$(git remote get-url origin 2>/dev/null | sed -E 's|.*github\.com[/:]([^/]+)/([^/.]+)(\.git)?$|\2|' || echo 'crit')}"
  GIT_BRANCH:
    sh: echo "${CRIT_GITHUB_BRANCH:-$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'main')}"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the crit binary (injects version from git)
    vars:
      LDFLAGS: "-s -w -X main.version={{.VERSION}}"
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY}} {{.CMD_PKG}}
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY}}"

  install:
    desc: Install the crit binary to GOPATH/bin (injects version from git)
    vars:
      LDFLAGS: "-s -w -X main.version={{.VERSION}}"
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" {{.CMD_PKG}}

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test-verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test -v ./...

  test-race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  lint:
    desc: Run go vet (static analysis)
    cmds:
      - go vet ./...

  format:
    desc: Format Go source code with gofmt
    cmds:
      - gofmt -w .

  format-check:
    desc: Check Go source code formatting (no changes)
    cmds:
      - gofmt -l . | tee /dev/stderr | wc -l | grep -q '^0$'

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}

  init-claude:
    desc: Install Claude Code skills for this project (requires a build first)
    deps: [build]
    env:
      CRIT_GITHUB_OWNER: "{{.GIT_OWNER}}"
      CRIT_GITHUB_REPO: "{{.GIT_REPO}}"
      CRIT_GITHUB_BRANCH: "{{.GIT_BRANCH}}"
    cmds:
      - ./{{.BUILD_DIR}}/{{.BINARY}} setup-claude --project --force

  init-copilot:
    desc: Install GitHub Copilot CLI skills for this project (requires a build first)
    deps: [build]
    env:
      CRIT_GITHUB_OWNER: "{{.GIT_OWNER}}"
      CRIT_GITHUB_REPO: "{{.GIT_REPO}}"
      CRIT_GITHUB_BRANCH: "{{.GIT_BRANCH}}"
    cmds:
      - ./{{.BUILD_DIR}}/{{.BINARY}} setup-copilot --project --force

  init-opencode:
    desc: Install opencode commands for this project (requires a build first)
    deps: [build]
    env:
      CRIT_GITHUB_OWNER: "{{.GIT_OWNER}}"
      CRIT_GITHUB_REPO: "{{.GIT_REPO}}"
      CRIT_GITHUB_BRANCH: "{{.GIT_BRANCH}}"
    cmds:
      - ./{{.BUILD_DIR}}/{{.BINARY}} setup-opencode --project --force

  show-config:
    desc: Show the effective source URLs that the built binary would use
    cmds:
      - |
        OWNER="{{.GIT_OWNER}}"
        REPO="{{.GIT_REPO}}"
        BRANCH="{{.GIT_BRANCH}}"
        BASE="https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}"
        echo "Version:  {{.VERSION}}"
        echo ""
        echo "Repository coordinates:"
        echo "  CRIT_GITHUB_OWNER  = ${OWNER}"
        echo "  CRIT_GITHUB_REPO   = ${REPO}"
        echo "  CRIT_GITHUB_BRANCH = ${BRANCH}"
        echo ""
        echo "Effective default URLs (override with CRIT_SKILLS_DIR / CRIT_OPENCODE_DIR):"
        echo "  Skills:   ${BASE}/packages/claude-code/skills"
        echo "  Commands: ${BASE}/packages/opencode/commands"

  all:
    desc: Format, lint, test, and build
    cmds:
      - task: format
      - task: lint
      - task: test
      - task: build


  test:
