version: "3"

# Root Taskfile — delegates build/test/lint tasks to packages/crit-cli/
# and provides repo-level utilities (symlink checks, package init tasks).

vars:
  CLI_DIR: packages/crit-cli

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ── Build / test / lint / format ─────────────────────────────────────────

  build:
    desc: Build the crit binary (delegates to packages/crit-cli)
    dir: "{{.CLI_DIR}}"
    cmds: [task build]

  install:
    desc: Install the crit binary to GOPATH/bin
    dir: "{{.CLI_DIR}}"
    cmds: [task install]

  test:
    desc: Run all tests
    dir: "{{.CLI_DIR}}"
    cmds: [task test]

  test-verbose:
    desc: Run all tests with verbose output
    dir: "{{.CLI_DIR}}"
    cmds: [task test-verbose]

  test-race:
    desc: Run tests with race detector
    dir: "{{.CLI_DIR}}"
    cmds: [task test-race]

  lint:
    desc: Run go vet (static analysis)
    dir: "{{.CLI_DIR}}"
    cmds: [task lint]

  format:
    desc: Format Go source code with gofmt
    dir: "{{.CLI_DIR}}"
    cmds: [task format]

  format-check:
    desc: Check Go source code formatting (no changes)
    dir: "{{.CLI_DIR}}"
    cmds: [task format-check]

  tidy:
    desc: Tidy go.mod and go.sum
    dir: "{{.CLI_DIR}}"
    cmds: [task tidy]

  clean:
    desc: Remove build artifacts
    dir: "{{.CLI_DIR}}"
    cmds: [task clean]

  all:
    desc: "Format, lint, test, and build (full CI pipeline)"
    dir: "{{.CLI_DIR}}"
    cmds: [task all]

  # ── Optional project-local AI agent setup ────────────────────────────────
  # These tasks install skills/commands into the CURRENT project directory.
  # They are optional convenience helpers — the repository works without them.
  # Choose the AI agent(s) you develop with.

  init-claude:
    desc: "[optional] Install Claude Code skills for this project"
    dir: "{{.CLI_DIR}}"
    cmds: [task init-claude]

  init-copilot:
    desc: "[optional] Install GitHub Copilot CLI skills for this project"
    dir: "{{.CLI_DIR}}"
    cmds: [task init-copilot]

  init-opencode:
    desc: "[optional] Install opencode commands for this project"
    dir: "{{.CLI_DIR}}"
    cmds: [task init-opencode]

  # ── Repository maintenance ────────────────────────────────────────────────

  check-symlinks:
    desc: Verify all declared symlinks in packages/ are intact
    cmds:
      - |
        FAILED=0
        for link in packages/copilot/skills; do
          if [ ! -L "$link" ]; then
            echo "ERROR: expected symlink missing: $link"
            FAILED=1
          elif [ ! -e "$link" ]; then
            echo "ERROR: symlink broken (target missing): $link -> $(readlink $link)"
            FAILED=1
          else
            echo "OK: $link -> $(readlink $link)"
          fi
        done
        if [ $FAILED -ne 0 ]; then
          echo ""
          echo "Fix: cd packages/copilot && ln -s ../claude-code/skills skills"
          exit 1
        fi
